<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="lsBlack" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" font-size="25" font-weight="bold" fill="#1a1a1a">The Streaming Latency Spectrum</text>
  <text x="700" y="62" text-anchor="middle" font-size="16" font-style="italic" fill="#555555">Result latencies across the streaming computing model</text>

  <!-- Blocks above the axis -->
  <rect x="175" y="120" width="360" height="86" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2.5"/>
  <text x="355" y="148" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#17365d">Fast processing &amp; fast monitoring</text>
  <text x="355" y="172" text-anchor="middle" font-size="13.5" fill="#333333">First results in O(10 s), targeting 10–30 s</text>
  <text x="355" y="192" text-anchor="middle" font-size="13.5" fill="#333333">High stats control room displays and AI analytics</text>
  <line x1="350" y1="206" x2="350" y2="278" stroke="#1a1a1a" stroke-width="2"/>

  <rect x="790" y="100" width="330" height="106" rx="8" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="955" y="128" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#1a1a1a">Data validation</text>
  <text x="955" y="152" text-anchor="middle" font-size="13.5" fill="#333333">Produced-data quality and readiness, days</text>
  <text x="955" y="172" text-anchor="middle" font-size="13.5" fill="#333333">Based on automated calibration/validation</text>
  <text x="955" y="192" text-anchor="middle" font-size="13.5" fill="#333333">loop, AI assessment</text>
  <line x1="950" y1="206" x2="950" y2="278" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Axis -->
  <line x1="80" y1="280" x2="1360" y2="280" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#lsBlack)"/>
  <text x="1360" y="260" text-anchor="end" font-size="14.5" font-weight="bold" fill="#1a1a1a">Result latency</text>

  <line x1="150" y1="274" x2="150" y2="286" stroke="#1a1a1a" stroke-width="2"/>
  <text x="150" y="306" text-anchor="middle" font-size="14" fill="#333333">1 s</text>
  <line x1="350" y1="274" x2="350" y2="286" stroke="#1a1a1a" stroke-width="2"/>
  <text x="350" y="306" text-anchor="middle" font-size="14" fill="#333333">10 s</text>
  <line x1="550" y1="274" x2="550" y2="286" stroke="#1a1a1a" stroke-width="2"/>
  <text x="550" y="306" text-anchor="middle" font-size="14" fill="#333333">minutes</text>
  <line x1="750" y1="274" x2="750" y2="286" stroke="#1a1a1a" stroke-width="2"/>
  <text x="750" y="306" text-anchor="middle" font-size="14" fill="#333333">hours</text>
  <line x1="950" y1="274" x2="950" y2="286" stroke="#1a1a1a" stroke-width="2"/>
  <text x="950" y="306" text-anchor="middle" font-size="14" fill="#333333">days</text>
  <line x1="1150" y1="274" x2="1150" y2="286" stroke="#1a1a1a" stroke-width="2"/>
  <text x="1150" y="306" text-anchor="middle" font-size="14" fill="#333333">weeks</text>

  <!-- Blocks below the axis -->
  <line x1="120" y1="282" x2="120" y2="330" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="60" y="330" width="330" height="86" rx="8" fill="#d5e0f5" stroke="#4472c4" stroke-width="2.5"/>
  <text x="225" y="358" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#17365d">DAQ</text>
  <text x="225" y="382" text-anchor="middle" font-size="13.5" fill="#333333">Real time validation of detector and data</text>
  <text x="225" y="402" text-anchor="middle" font-size="13.5" fill="#333333">integrity, anomaly detection — O(1 s) and below</text>

  <line x1="645" y1="282" x2="645" y2="330" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="460" y="330" width="370" height="106" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2.5"/>
  <text x="645" y="358" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#17365d">Prompt processing</text>
  <text x="645" y="382" text-anchor="middle" font-size="13.5" fill="#333333">Full reco first pass, persistent outputs, mins/hrs</text>
  <text x="645" y="402" text-anchor="middle" font-size="13.5" fill="#333333">STFs processed as they arrive</text>
  <text x="645" y="422" text-anchor="middle" font-size="13.5" fill="#333333">Day 1: 100%. Yr 3: likely less.</text>

  <line x1="1195" y1="282" x2="1195" y2="330" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1000" y="330" width="330" height="86" rx="8" fill="#f1f8e9" stroke="#538135" stroke-width="2.5"/>
  <text x="1165" y="358" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#1a3311">Calibration</text>
  <text x="1165" y="382" text-anchor="middle" font-size="13.5" fill="#333333">Complete calibration, ~2 weeks</text>
  <text x="1165" y="402" text-anchor="middle" font-size="13.5" fill="#333333">Feeds back into analysis-ready processing</text>
</svg>
