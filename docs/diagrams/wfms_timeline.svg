<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 690" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="tlBlack" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="690" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="36" text-anchor="middle" font-size="25" font-weight="bold" fill="#1a1a1a">The WFMS Timeline</text>
  <text x="700" y="62" text-anchor="middle" font-size="16" font-style="italic" fill="#555555" xml:space="preserve">The three-year plan, and the out-years to physics datataking · <tspan font-weight="bold">Priority objectives in bold</tspan></text>

  <!-- ===== Three-year plan ===== -->
  <rect x="60" y="90" width="420" height="316" rx="10" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="270" y="122" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a1a">2026</text>
  <text x="80" y="152" font-size="15" font-weight="bold" fill="#1a1a1a">PanDA production smooth end to end —</text>
  <text x="80" y="172" font-size="15" font-weight="bold" fill="#1a1a1a">physics need to cataloged, accessible data</text>
  <text x="80" y="200" font-size="15" font-weight="bold" fill="#1a1a1a">Coherent WFMS services on one platform —</text>
  <text x="80" y="220" font-size="15" font-weight="bold" fill="#1a1a1a">production, testbed, AI assistance</text>
  <text x="80" y="248" font-size="15" font-weight="bold" fill="#1a1a1a">E0-E1 interface doc — input to the Oct review</text>
  <line x1="80" y1="264" x2="460" y2="264" stroke="#d9c091" stroke-width="1.5"/>
  <text x="80" y="290" font-size="15" fill="#333333">Mature stable MCP interfaces</text>
  <text x="80" y="310" font-size="15" fill="#333333">(amid fast tech evolution)</text>
  <text x="80" y="338" font-size="15" fill="#333333">Requirements document closed out</text>

  <rect x="490" y="90" width="420" height="316" rx="10" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="700" y="122" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a1a">2027</text>
  <text x="510" y="152" font-size="15" font-weight="bold" fill="#1a1a1a">Fast processing operational end to end —</text>
  <text x="510" y="172" font-size="15" font-weight="bold" fill="#1a1a1a">STF acquisition through slices to</text>
  <text x="510" y="192" font-size="15" font-weight="bold" fill="#1a1a1a">streaming reco payload to results</text>
  <text x="510" y="220" font-size="15" font-weight="bold" fill="#1a1a1a">Alignment and calibration workflow plan</text>
  <text x="510" y="240" font-size="15" font-weight="bold" fill="#1a1a1a">established with DSCs — demonstrators mid-2028</text>
  <text x="510" y="268" font-size="15" font-weight="bold" fill="#1a1a1a">End-to-end AI backplane prototype, with DAQ</text>
  <line x1="510" y1="284" x2="890" y2="284" stroke="#d9c091" stroke-width="1.5"/>
  <text x="510" y="310" font-size="15" fill="#333333">Establish foundation model hosting if needed</text>
  <text x="510" y="338" font-size="15" fill="#333333">Analysis infrastructure needs assessed</text>
  <text x="510" y="366" font-size="15" fill="#333333">ESnet requirements document closed out</text>

  <rect x="920" y="90" width="420" height="316" rx="10" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="1130" y="122" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a1a">2028</text>
  <text x="940" y="152" font-size="15" font-weight="bold" fill="#1a1a1a">Alignment/calibration demonstrator end to</text>
  <text x="940" y="172" font-size="15" font-weight="bold" fill="#1a1a1a">end, representative of ePIC complexity</text>
  <text x="940" y="200" font-size="15" font-weight="bold" fill="#1a1a1a">AI-driven autonomous calibration demonstrated</text>
  <text x="940" y="228" font-size="15" font-weight="bold" fill="#1a1a1a">Streaming challenge — DAQ egress to analysis,</text>
  <text x="940" y="248" font-size="15" font-weight="bold" fill="#1a1a1a">the evaluation platform for streaming WFMS</text>
  <line x1="940" y1="264" x2="1320" y2="264" stroke="#d9c091" stroke-width="1.5"/>
  <text x="940" y="290" font-size="15" fill="#333333">Calibration demonstrator documented for DSC</text>
  <text x="940" y="310" font-size="15" fill="#333333">evaluation, feedback, and integration</text>
  <text x="940" y="338" font-size="15" fill="#333333">New AI infrastructure generation enabled</text>
  <text x="940" y="358" font-size="15" fill="#333333">by AI proposal outcomes</text>
  <text x="940" y="386" font-size="15" fill="#333333">Clarify heterogeneous computing needs</text>

  <!-- ===== Out-years ===== -->
  <text x="60" y="460" font-size="16.5" font-weight="bold" fill="#1a1a1a">The out-years — WFMS planning tied to DAQ, computing, and AI</text>

  <line x1="60" y1="486" x2="1370" y2="486" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#tlBlack)"/>
  <line x1="230" y1="486" x2="230" y2="502" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="570" y1="486" x2="570" y2="502" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="890" y1="486" x2="890" y2="502" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="1210" y1="486" x2="1210" y2="502" stroke="#1a1a1a" stroke-width="1.8"/>

  <rect x="60" y="506" width="340" height="124" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2.5"/>
  <text x="230" y="534" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Development &amp; demonstrators — FY26–28</text>
  <text x="230" y="560" text-anchor="middle" font-size="14" fill="#333333">Streaming orchestration; AI-empowered</text>
  <text x="230" y="580" text-anchor="middle" font-size="14" fill="#333333">streaming processing; autonomous calibration</text>
  <text x="230" y="606" text-anchor="middle" font-size="14" font-style="italic" fill="#555555">DAQ: MicroDAQ → MiniDAQ</text>

  <rect x="420" y="506" width="300" height="124" rx="8" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="570" y="534" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Challenges — FY28–29</text>
  <text x="570" y="560" text-anchor="middle" font-size="14" fill="#333333">Streaming and analysis challenges —</text>
  <text x="570" y="580" text-anchor="middle" font-size="14" fill="#333333">the streaming WFMS evaluation platform</text>
  <text x="570" y="606" text-anchor="middle" font-size="14" font-style="italic" fill="#555555">DAQ: Full DAQ-v1</text>

  <rect x="740" y="506" width="300" height="124" rx="8" fill="#f1f8e9" stroke="#538135" stroke-width="2.5"/>
  <text x="890" y="534" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Scaling — FY29–31</text>
  <text x="890" y="560" text-anchor="middle" font-size="14" fill="#333333">Distributed data challenges; AI-driven</text>
  <text x="890" y="580" text-anchor="middle" font-size="14" fill="#333333">alignment, calibration, and control</text>
  <text x="890" y="606" text-anchor="middle" font-size="14" font-style="italic" fill="#555555">DAQ: Production DAQ</text>

  <rect x="1060" y="506" width="310" height="124" rx="8" fill="#d6e8cc" stroke="#538135" stroke-width="2.5"/>
  <text x="1215" y="534" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Toward datataking — mid-2030s</text>
  <text x="1215" y="560" text-anchor="middle" font-size="14" fill="#333333">Commissioning, early datataking, then</text>
  <text x="1215" y="580" text-anchor="middle" font-size="14" fill="#333333">steady-state ops — full streaming model,</text>
  <text x="1215" y="600" text-anchor="middle" font-size="14" fill="#333333">around the clock, maximal automation</text>
</svg>
