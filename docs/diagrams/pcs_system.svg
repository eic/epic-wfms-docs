<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="880" viewBox="0 0 1240 880" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="1240" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="620" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#222">The Physics Configuration System (PCS)</text>
  <text x="620" y="70" text-anchor="middle" font-size="16" font-style="italic" fill="#555">Tags classify, sample variants discriminate, the composed name carries the identity in a compact form usable in entity naming</text>

  <!-- Tag catalog container -->
  <rect x="50" y="95" width="1140" height="175" rx="8" fill="#f5f7fb" stroke="#8ea0c8" stroke-width="1.5"/>
  <text x="70" y="120" font-size="16" font-weight="bold" fill="#333">Tag catalog — named parameter sets, from draft (edit) to locked (immutable) for production</text>

  <!-- Stage tag boxes -->
  <rect x="70" y="135" width="250" height="80" rx="6" fill="#eaeffa" stroke="#4472c4" stroke-width="1.6"/>
  <text x="195" y="161" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a4d8f">Physics (p)</text>
  <text x="195" y="185" text-anchor="middle" font-size="14.5" fill="#333">Process, beams, kinematics;</text>
  <text x="195" y="204" text-anchor="middle" font-size="14" fill="#666">grouped by physics category</text>

  <rect x="350" y="135" width="250" height="80" rx="6" fill="#d6e8cc" stroke="#538135" stroke-width="1.6"/>
  <text x="475" y="161" text-anchor="middle" font-size="16" font-weight="bold" fill="#375c22">Event generation (e)</text>
  <text x="475" y="185" text-anchor="middle" font-size="14.5" fill="#333">Generator and version,</text>
  <text x="475" y="204" text-anchor="middle" font-size="14" fill="#666">generation settings</text>

  <rect x="630" y="135" width="250" height="80" rx="6" fill="#fdf3e0" stroke="#bf8f00" stroke-width="1.6"/>
  <text x="755" y="161" text-anchor="middle" font-size="16" font-weight="bold" fill="#8a6700">Simulation (s)</text>
  <text x="755" y="185" text-anchor="middle" font-size="14.5" fill="#333">Detector simulation</text>
  <text x="755" y="204" text-anchor="middle" font-size="14" fill="#666">configuration</text>

  <rect x="910" y="135" width="250" height="80" rx="6" fill="#fce5cd" stroke="#c55a11" stroke-width="1.6"/>
  <text x="1035" y="161" text-anchor="middle" font-size="16" font-weight="bold" fill="#9c4a10">Reconstruction (r)</text>
  <text x="1035" y="185" text-anchor="middle" font-size="14.5" fill="#333">EICrecon reconstruction</text>
  <text x="1035" y="204" text-anchor="middle" font-size="14" fill="#666">configuration</text>

  <!-- Background overlay -->
  <rect x="70" y="225" width="1090" height="34" rx="6" fill="#dcdcf0" stroke="#3f3f8f" stroke-width="1.6"/>
  <text x="615" y="247" text-anchor="middle" font-size="14.5" fill="#2c2c66">Background (k) — an orthogonal overlay, composed into a dataset alongside the stage tags</text>

  <!-- Physics categories box (floating, below Physics) -->
  <rect x="70" y="290" width="250" height="118" rx="6" fill="#eaeffa" stroke="#4472c4" stroke-width="1.6"/>
  <text x="195" y="314" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a4d8f">Physics categories</text>
  <text x="195" y="334" text-anchor="middle" font-size="14" font-style="italic" fill="#555">Built into the p tag number</text>
  <g font-size="14.5" fill="#333">
    <text x="82" y="358">1  Single Particle</text>
    <text x="82" y="377">2  DIS</text>
    <text x="82" y="396">3  DVCS</text>
    <text x="212" y="358">4  SIDIS</text>
    <text x="212" y="377">5  Exclusive</text>
    <text x="212" y="396">6  Background</text>
  </g>

  <!-- Composed name text (middle) -->
  <text x="365" y="318" font-size="16" font-weight="bold" fill="#222">Composed name</text>
  <text x="365" y="342" font-size="14.5" fill="#333">Composed from the tags and the sample variant;</text>
  <text x="365" y="363" font-size="14.5" fill="#333">the identity used in naming tasks, datasets, files</text>
  <text x="365" y="385" font-size="14" fill="#666">Optional segments (k, sample variant) dashed</text>

  <!-- Sample variant (right) -->
  <rect x="790" y="290" width="350" height="94" rx="6" fill="#f7e6ef" stroke="#a64d79" stroke-width="1.6"/>
  <text x="965" y="314" text-anchor="middle" font-size="16" font-weight="bold" fill="#7d3a5b">Sample variant</text>
  <text x="965" y="338" text-anchor="middle" font-size="14.5" fill="#333">Discriminates same-configuration samples,</text>
  <text x="965" y="357" text-anchor="middle" font-size="14.5" fill="#333">e.g. single-particle angular ranges</text>
  <text x="965" y="376" text-anchor="middle" font-size="14.5" fill="#333">3to50deg, 45to135deg, 130to177deg</text>

  <!-- Arrows into the composed name -->
  <line x1="345" y1="270" x2="345" y2="426" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="965" y1="384" x2="965" y2="426" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- chips -->
  <g font-family="Menlo, Consolas, monospace" font-size="14">
    <rect x="70" y="430" width="80" height="42" rx="5" fill="#efefef" stroke="#888" stroke-width="1.4"/>
    <text x="110" y="456" text-anchor="middle" fill="#444">{scope}</text>
    <rect x="160" y="430" width="130" height="42" rx="5" fill="#efefef" stroke="#888" stroke-width="1.4"/>
    <text x="225" y="456" text-anchor="middle" fill="#444">{det_version}</text>
    <rect x="300" y="430" width="122" height="42" rx="5" fill="#efefef" stroke="#888" stroke-width="1.4"/>
    <text x="361" y="456" text-anchor="middle" fill="#444">{det_config}</text>
    <rect x="432" y="430" width="80" height="42" rx="5" fill="#eaeffa" stroke="#4472c4" stroke-width="1.6"/>
    <text x="472" y="456" text-anchor="middle" fill="#2a4d8f">{p_tag}</text>
    <rect x="522" y="430" width="80" height="42" rx="5" fill="#d6e8cc" stroke="#538135" stroke-width="1.6"/>
    <text x="562" y="456" text-anchor="middle" fill="#375c22">{e_tag}</text>
    <rect x="612" y="430" width="80" height="42" rx="5" fill="#fdf3e0" stroke="#bf8f00" stroke-width="1.6"/>
    <text x="652" y="456" text-anchor="middle" fill="#8a6700">{s_tag}</text>
    <rect x="702" y="430" width="80" height="42" rx="5" fill="#fce5cd" stroke="#c55a11" stroke-width="1.6"/>
    <text x="742" y="456" text-anchor="middle" fill="#9c4a10">{r_tag}</text>
    <rect x="792" y="430" width="80" height="42" rx="5" fill="#dcdcf0" stroke="#3f3f8f" stroke-width="1.6" stroke-dasharray="5,3"/>
    <text x="832" y="456" text-anchor="middle" fill="#2c2c66">{k_tag}</text>
    <rect x="882" y="430" width="118" height="42" rx="5" fill="#f7e6ef" stroke="#a64d79" stroke-width="1.6" stroke-dasharray="5,3"/>
    <text x="941" y="456" text-anchor="middle" fill="#7d3a5b">{sample}</text>
  </g>
  <g font-size="15" font-weight="bold" fill="#555">
    <text x="155" y="460" text-anchor="middle">.</text>
    <text x="295" y="460" text-anchor="middle">.</text>
    <text x="427" y="460" text-anchor="middle">.</text>
    <text x="517" y="460" text-anchor="middle">.</text>
    <text x="607" y="460" text-anchor="middle">.</text>
    <text x="697" y="460" text-anchor="middle">.</text>
    <text x="787" y="460" text-anchor="middle">.</text>
    <text x="877" y="460" text-anchor="middle">.</text>
  </g>

  <!-- Gathering line under the composed name, arrow to dataset -->
  <line x1="70" y1="488" x2="1000" y2="488" stroke="#444" stroke-width="1.6"/>
  <line x1="535" y1="488" x2="535" y2="516" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Dataset -->
  <rect x="340" y="520" width="460" height="92" rx="6" fill="#f1f8e9" stroke="#538135" stroke-width="1.8"/>
  <text x="570" y="550" text-anchor="middle" font-size="16" font-weight="bold" fill="#375c22">Dataset — the concrete production unit</text>
  <text x="570" y="576" text-anchor="middle" font-size="14.5" fill="#333">One sample, produced by a single task;</text>
  <text x="570" y="597" text-anchor="middle" font-size="14.5" fill="#333">registered under the composed name</text>

  <!-- Arrow: dataset -> campaign task -->
  <line x1="570" y1="612" x2="570" y2="656" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Production config and campaign task -->
  <rect x="90" y="660" width="230" height="92" rx="6" fill="#f2f2f2" stroke="#777" stroke-width="1.6"/>
  <text x="205" y="690" text-anchor="middle" font-size="16" font-weight="bold" fill="#444">Production config</text>
  <text x="205" y="716" text-anchor="middle" font-size="14.5" fill="#333">Execution settings —</text>
  <text x="205" y="737" text-anchor="middle" font-size="14.5" fill="#333">a mutable working template</text>

  <line x1="320" y1="706" x2="384" y2="706" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="390" y="660" width="690" height="92" rx="6" fill="#eaeffa" stroke="#4472c4" stroke-width="2"/>
  <text x="735" y="690" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a4d8f">Campaign task — the submit-ready specification</text>
  <text x="735" y="716" text-anchor="middle" font-size="14.5" fill="#333">Tags, dataset, and production config bound together;</text>
  <text x="735" y="737" text-anchor="middle" font-size="14.5" fill="#333">staged and submitted from the campaign catalog</text>

  <!-- Arrow: task -> PanDA -->
  <line x1="735" y1="752" x2="735" y2="788" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="390" y="794" width="690" height="58" rx="6" fill="#ffffff" stroke="#4472c4" stroke-width="1.6"/>
  <text x="735" y="818" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#2a4d8f">Submitted to PanDA under the composed name</text>
  <text x="735" y="839" text-anchor="middle" font-size="14.5" fill="#333">The PanDA task and its Rucio output datasets carry the identity</text>
</svg>
