<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dfNavy" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#17365d"/>
    </marker>
    <marker id="dfGreen" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="12" refX="13" refY="6" orient="auto">
      <path d="M0,0 L13,6 L0,12 z" fill="#538135"/>
    </marker>
    <marker id="dfGray" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f7f7f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="650" y="36" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">ePIC Production Dataflow</text>

  <!-- ===== Job orchestration zone ===== -->
  <rect x="40" y="58" width="1220" height="150" rx="10" fill="none" stroke="#7f7f7f" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="82" font-size="14.5" font-weight="bold" fill="#17365d">Job orchestration — control only; no science data passes through PanDA</text>

  <rect x="70" y="100" width="270" height="84" rx="8" fill="#e9def1" stroke="#7030a0" stroke-width="2"/>
  <text x="205" y="128" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#3b1e56">epicprod submission</text>
  <text x="205" y="150" text-anchor="middle" font-size="13" fill="#333333">Campaign task from the catalog</text>
  <text x="205" y="169" text-anchor="middle" font-size="13" fill="#333333">via the prod-ops agent</text>

  <line x1="340" y1="142" x2="486" y2="142" stroke="#17365d" stroke-width="2.5" marker-end="url(#dfNavy)"/>
  <text x="413" y="130" text-anchor="middle" font-size="13" fill="#17365d">Submit task</text>

  <rect x="490" y="100" width="300" height="84" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2"/>
  <text x="640" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#17365d">PanDA / JEDI — BNL</text>
  <text x="640" y="150" text-anchor="middle" font-size="13" fill="#333333">Task → jobs, brokered to computing sites</text>
  <text x="640" y="169" text-anchor="middle" font-size="12.5" font-style="italic" fill="#555555">Workload management</text>

  <line x1="790" y1="142" x2="986" y2="142" stroke="#7f7f7f" stroke-width="1.8"/>
  <text x="888" y="130" text-anchor="middle" font-size="12.5" fill="#555555">Log registration</text>

  <rect x="990" y="100" width="240" height="84" rx="8" fill="#f1f8e9" stroke="#538135" stroke-width="2"/>
  <text x="1110" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3311">BNL Rucio</text>
  <text x="1110" y="150" text-anchor="middle" font-size="13" fill="#333333">Job log datasets</text>
  <text x="1110" y="169" text-anchor="middle" font-size="12.5" font-style="italic" fill="#555555">PanDA-coupled instance</text>

  <!-- Control and log connectors between zones -->
  <line x1="680" y1="184" x2="798" y2="266" stroke="#17365d" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#dfNavy)"/>
  <text x="755" y="222" font-size="13" fill="#17365d">Dispatches jobs</text>

  <line x1="1040" y1="272" x2="1118" y2="190" stroke="#7f7f7f" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#dfGray)"/>
  <text x="1095" y="226" font-size="13" fill="#555555">Job log tarballs</text>

  <!-- ===== Science dataflow zone ===== -->
  <rect x="40" y="240" width="1220" height="300" rx="10" fill="none" stroke="#7f7f7f" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="264" font-size="14.5" font-weight="bold" fill="#1a3311">Science dataflow — the payload handles all science data against JLab Rucio</text>

  <!-- JLab Rucio -->
  <rect x="70" y="272" width="310" height="246" rx="8" fill="#f1f8e9" stroke="#538135" stroke-width="2.5"/>
  <text x="225" y="298" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a3311">JLab Rucio</text>
  <text x="225" y="316" text-anchor="middle" font-size="13" font-style="italic" fill="#555555">ePIC science data</text>

  <rect x="90" y="330" width="270" height="78" rx="6" fill="#d6e8cc" stroke="#538135" stroke-width="1.8"/>
  <text x="225" y="354" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a3311">EVGEN inputs</text>
  <text x="225" y="374" text-anchor="middle" font-size="13" fill="#333333">/EVGEN/… · HepMC3 · disk/tape</text>
  <text x="225" y="393" text-anchor="middle" font-size="13" fill="#333333">Generated by PWGs</text>

  <rect x="90" y="424" width="270" height="76" rx="6" fill="#d6e8cc" stroke="#538135" stroke-width="1.8"/>
  <text x="225" y="449" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a3311">Produced outputs</text>
  <text x="225" y="469" text-anchor="middle" font-size="13" fill="#333333">RECO datasets</text>
  <text x="225" y="488" text-anchor="middle" font-size="13" fill="#333333">Named by the composed task name</text>

  <!-- Worker node -->
  <rect x="620" y="272" width="430" height="246" rx="8" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="835" y="298" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Worker node — production payload</text>
  <text x="835" y="316" text-anchor="middle" font-size="12.5" font-style="italic" fill="#555555">Distributed compute: BNL, JLab, OSG, NERSC Perlmutter, Manitoba, …</text>

  <rect x="645" y="332" width="380" height="50" rx="6" fill="#ffffff" stroke="#bf8f00" stroke-width="1.5"/>
  <text x="835" y="353" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1a1a1a">Stage EVGEN input</text>
  <text x="835" y="373" text-anchor="middle" font-size="12.5" fill="#555555">xrootd read from JLab Rucio</text>

  <rect x="645" y="396" width="380" height="50" rx="6" fill="#ffffff" stroke="#bf8f00" stroke-width="1.5"/>
  <text x="835" y="417" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1a1a1a">Run simulation + reconstruction</text>
  <text x="835" y="437" text-anchor="middle" font-size="12.5" fill="#555555">The campaign payload container</text>

  <rect x="645" y="460" width="380" height="50" rx="6" fill="#ffffff" stroke="#bf8f00" stroke-width="1.5"/>
  <text x="835" y="481" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1a1a1a">Register + upload outputs</text>
  <text x="835" y="501" text-anchor="middle" font-size="12.5" fill="#555555">Direct registration to JLab Rucio</text>

  <!-- Science data arrows -->
  <line x1="384" y1="357" x2="614" y2="357" stroke="#538135" stroke-width="4" marker-end="url(#dfGreen)"/>
  <text x="500" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#538135">EVGEN input files</text>

  <line x1="616" y1="485" x2="390" y2="485" stroke="#538135" stroke-width="4" marker-end="url(#dfGreen)"/>
  <text x="500" y="472" text-anchor="middle" font-size="13" font-weight="bold" fill="#538135">RECO outputs</text>

  <!-- Catalog lineage band -->
  <line x1="225" y1="518" x2="225" y2="566" stroke="#7f7f7f" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="835" y1="518" x2="835" y2="566" stroke="#7f7f7f" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="40" y="566" width="1220" height="50" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2"/>
  <text x="650" y="596" text-anchor="middle" font-size="14.5" fill="#17365d">Task catalog — EVGEN inputs and produced outputs are recorded on the task, beside the physics configuration that made them</text>

</svg>
