<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="9" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,4.5 L0,9 z" fill="#444"/>
    </marker>
    <marker id="ahG" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="9" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,4.5 L0,9 z" fill="#38761d"/>
    </marker>
    <marker id="ahB" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="9" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L10,4.5 L0,9 z" fill="#3d85c6"/>
    </marker>
  </defs>

  <rect width="1500" height="900" fill="white"/>

  <text x="750" y="36" text-anchor="middle" font-size="21" font-weight="bold" fill="#111">The streaming workflow testbed</text>
  <text x="750" y="60" text-anchor="middle" font-size="13.5" font-style="italic" fill="#666">The first streaming testbed workflows on the common WFMS platform</text>

  <!-- DAQ (shared source) -->
  <rect x="600" y="84" width="300" height="72" rx="10" fill="#cfe2f3" stroke="#3d85c6" stroke-width="2"/>
  <text x="750" y="112" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">DAQ — simulated in the testbed</text>
  <text x="750" y="132" text-anchor="middle" font-size="12" fill="#333">broadcasts the run lifecycle · emits STFs</text>

  <!-- DAQ split to both columns (orthogonal) -->
  <line x1="750" y1="156" x2="750" y2="170" stroke="#444" stroke-width="1.8"/>
  <line x1="400" y1="170" x2="1030" y2="170" stroke="#444" stroke-width="1.8"/>
  <line x1="400" y1="170" x2="400" y2="192" stroke="#444" stroke-width="1.8" marker-end="url(#ah)"/>
  <line x1="1030" y1="170" x2="1030" y2="192" stroke="#444" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- ===== Left column: prompt processing ===== -->
  <rect x="240" y="196" width="320" height="46" rx="8" fill="#f1f3f4" stroke="#666" stroke-width="1.6"/>
  <text x="400" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Prompt processing</text>
  <text x="400" y="233" text-anchor="middle" font-size="11.5" font-style="italic" fill="#555">Full processing of STF files on arrival</text>

  <rect x="240" y="246" width="320" height="68" rx="9" fill="#d9ead3" stroke="#6aa84f" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#111">Data Agent</text>
  <text x="400" y="287" text-anchor="middle" font-size="11.5" fill="#333">creates the run dataset at run start</text>
  <text x="400" y="302" text-anchor="middle" font-size="11.5" fill="#333">registers arriving STFs into it</text>

  <line x1="400" y1="314" x2="400" y2="328" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="240" y="330" width="320" height="68" rx="9" fill="#fce5cd" stroke="#e69138" stroke-width="2"/>
  <text x="400" y="354" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#111">Run dataset — Rucio</text>
  <text x="400" y="371" text-anchor="middle" font-size="11.5" fill="#333">open dataset, filling as STFs arrive</text>
  <text x="400" y="386" text-anchor="middle" font-size="11.5" fill="#333">replicated to both E1 buffers</text>

  <line x1="400" y1="398" x2="400" y2="412" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="240" y="414" width="320" height="68" rx="9" fill="#d9ead3" stroke="#6aa84f" stroke-width="2"/>
  <text x="400" y="438" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#111">Processing Agent</text>
  <text x="400" y="455" text-anchor="middle" font-size="11.5" fill="#333">Establishes the prompt processing task</text>
  <text x="400" y="470" text-anchor="middle" font-size="11.5" fill="#333">for each Echelon 1</text>

  <line x1="400" y1="482" x2="400" y2="496" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="240" y="498" width="320" height="68" rx="9" fill="#cfe2f3" stroke="#3d85c6" stroke-width="2"/>
  <text x="400" y="522" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1c4587">PanDA / JEDI</text>
  <text x="400" y="539" text-anchor="middle" font-size="11.5" fill="#333">generates jobs as the dataset fills</text>
  <text x="400" y="554" text-anchor="middle" font-size="11.5" fill="#333">brokered to E1 queues</text>

  <line x1="400" y1="566" x2="400" y2="580" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="240" y="582" width="320" height="68" rx="9" fill="#cfe2f3" stroke="#3d85c6" stroke-width="2"/>
  <text x="400" y="606" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1c4587">Processing jobs at the E1s</text>
  <text x="400" y="623" text-anchor="middle" font-size="11.5" fill="#333">EICrecon payload in the ePIC container</text>
  <text x="400" y="638" text-anchor="middle" font-size="11.5" fill="#333">outputs and status to the monitor</text>

  <line x1="400" y1="650" x2="400" y2="664" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="240" y="666" width="320" height="68" rx="9" fill="#fce5cd" stroke="#e69138" stroke-width="2"/>
  <text x="400" y="690" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#111">Reconstructed STFs — Rucio</text>
  <text x="400" y="707" text-anchor="middle" font-size="11.5" fill="#333">reconstruction outputs registered in Rucio</text>
  <text x="400" y="722" text-anchor="middle" font-size="11.5" fill="#333">the archived full-sample data product</text>

  <!-- Decision box (between columns) -->
  <rect x="608" y="448" width="228" height="84" rx="10" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="1.8"/>
  <text x="722" y="476" text-anchor="middle" font-size="14" font-weight="bold" fill="#674ea7">Decision box</text>
  <text x="722" y="498" text-anchor="middle" font-size="11.5" fill="#333">processing decisions by ePIC, facilities</text>
  <text x="722" y="514" text-anchor="middle" font-size="11.5" fill="#333">based on data inspection</text>

  <path d="M 560 290 L 722 290 L 722 448" fill="none" stroke="#3d85c6" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#ahB)"/>
  <text x="734" y="380" font-size="11.5" fill="#3d85c6">run and data</text>
  <text x="734" y="395" font-size="11.5" fill="#3d85c6">notifications</text>
  <line x1="608" y1="512" x2="560" y2="528" stroke="#3d85c6" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#ahB)"/>
  <text x="588" y="508" text-anchor="middle" font-size="11.5" fill="#3d85c6">directs</text>

  <!-- ===== Right column: fast processing ===== -->
  <rect x="870" y="196" width="320" height="46" rx="8" fill="#f1f3f4" stroke="#666" stroke-width="1.6"/>
  <text x="1030" y="215" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Fast processing</text>
  <text x="1030" y="233" text-anchor="middle" font-size="11.5" font-style="italic" fill="#555">Fast TF streaming processing</text>

  <rect x="870" y="246" width="320" height="76" rx="9" fill="#d9ead3" stroke="#6aa84f" stroke-width="2"/>
  <text x="1030" y="272" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#111">Fast Processing Agents</text>
  <text x="1030" y="290" text-anchor="middle" font-size="11.5" fill="#333">sample TFs from arriving STFs · dispatch slice work</text>
  <text x="1030" y="305" text-anchor="middle" font-size="11.5" fill="#333">signal iDDS — run imminent, N workers needed</text>

  <line x1="950" y1="322" x2="950" y2="348" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="1120" y1="322" x2="1120" y2="348" stroke="#38761d" stroke-width="1.8" marker-end="url(#ahG)"/>

  <rect x="870" y="350" width="160" height="88" rx="9" fill="#fce5cd" stroke="#e69138" stroke-width="2"/>
  <text x="950" y="376" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#111">TF slices</text>
  <text x="950" y="394" text-anchor="middle" font-size="11.5" fill="#333">slice 1 · slice 2 · …</text>
  <text x="950" y="409" text-anchor="middle" font-size="11.5" fill="#333">dispatched by message</text>
  <text x="950" y="424" text-anchor="middle" font-size="11.5" fill="#333">delivered by XRootD</text>

  <rect x="1050" y="350" width="140" height="64" rx="9" fill="#d9ead3" stroke="#6aa84f" stroke-width="2"/>
  <text x="1120" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">iDDS</text>
  <text x="1120" y="394" text-anchor="middle" font-size="11" fill="#333">workflow management</text>

  <rect x="1250" y="344" width="200" height="76" rx="9" fill="#cfe2f3" stroke="#3d85c6" stroke-width="2"/>
  <text x="1350" y="368" text-anchor="middle" font-size="14" font-weight="bold" fill="#1c4587">Harvester</text>
  <text x="1350" y="386" text-anchor="middle" font-size="11" fill="#333">launches pilots on compute —</text>
  <text x="1350" y="400" text-anchor="middle" font-size="11" fill="#333">the slots the workers run in</text>

  <line x1="1190" y1="374" x2="1250" y2="374" stroke="#38761d" stroke-width="1.8" marker-end="url(#ahG)"/>

  <rect x="1050" y="446" width="140" height="64" rx="9" fill="#cfe2f3" stroke="#3d85c6" stroke-width="2"/>
  <text x="1120" y="472" text-anchor="middle" font-size="14" font-weight="bold" fill="#1c4587">PanDA</text>
  <text x="1120" y="490" text-anchor="middle" font-size="11" fill="#333">persistent worker jobs</text>

  <line x1="1120" y1="414" x2="1120" y2="446" stroke="#38761d" stroke-width="1.8" marker-end="url(#ahG)"/>
  <line x1="950" y1="438" x2="950" y2="540" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="1120" y1="510" x2="1120" y2="540" stroke="#38761d" stroke-width="1.8" marker-end="url(#ahG)"/>
  <path d="M 1350 420 L 1350 574 L 1196 574" fill="none" stroke="#38761d" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#ahG)"/>
  <text x="1362" y="500" font-size="11" fill="#38761d">pilots host the</text>
  <text x="1362" y="514" font-size="11" fill="#38761d">workers, spent</text>
  <text x="1362" y="528" font-size="11" fill="#38761d">ones replenished</text>

  <rect x="870" y="542" width="320" height="84" rx="9" fill="#cfe2f3" stroke="#3d85c6" stroke-width="2"/>
  <text x="1030" y="568" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1c4587">PanDA workers — standing pool</text>
  <text x="1030" y="586" text-anchor="middle" font-size="11.5" fill="#333">worker 1 · worker 2 · worker N — persistent</text>
  <text x="1030" y="601" text-anchor="middle" font-size="11.5" fill="#333">EICrecon per TF slice, results in seconds</text>

  <line x1="1030" y1="626" x2="1030" y2="650" stroke="#444" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="870" y="652" width="320" height="72" rx="9" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="2"/>
  <text x="1030" y="678" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#674ea7">Monitoring / validation / AI outputs</text>
  <text x="1030" y="696" text-anchor="middle" font-size="11.5" fill="#333">fast reconstruction results, delivered in seconds</text>

  <!-- AI assessment (between columns) -->
  <rect x="622" y="576" width="200" height="66" rx="10" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="1.8"/>
  <text x="722" y="606" text-anchor="middle" font-size="14" font-weight="bold" fill="#674ea7">AI assessment agents</text>
  <text x="722" y="626" text-anchor="middle" font-size="11.5" fill="#333">of the live processing</text>
  <line x1="622" y1="611" x2="560" y2="616" stroke="#8e7cc3" stroke-width="1.6" stroke-dasharray="6 5"/>
  <line x1="822" y1="600" x2="870" y2="586" stroke="#8e7cc3" stroke-width="1.6" stroke-dasharray="6 5"/>

  <!-- swf-monitor (floating, top right) -->
  <rect x="1210" y="84" width="250" height="104" rx="10" fill="#fff2cc" stroke="#f1c232" stroke-width="2.5"/>
  <text x="1335" y="120" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">swf-monitor</text>
  <text x="1335" y="145" text-anchor="middle" font-size="13" fill="#333">UIs, APIs, system data</text>
  <text x="1335" y="166" text-anchor="middle" font-size="13" fill="#333">web · DB · REST · MCP</text>

  <!-- DISpatcher bot (under swf-monitor) -->
  <line x1="1335" y1="188" x2="1335" y2="208" stroke="#666" stroke-width="1.8"/>
  <rect x="1235" y="208" width="200" height="70" rx="9" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="2"/>
  <text x="1335" y="236" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#674ea7">DISpatcher</text>
  <text x="1335" y="258" text-anchor="middle" font-size="12" fill="#333">Mattermost bot</text>

  <!-- corun-ai (below AI assessment agents, connected) -->
  <line x1="722" y1="642" x2="722" y2="660" stroke="#666" stroke-width="1.8"/>
  <rect x="622" y="660" width="200" height="66" rx="10" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="1.8"/>
  <text x="722" y="688" text-anchor="middle" font-size="14" font-weight="bold" fill="#674ea7">corun-ai</text>
  <text x="722" y="708" text-anchor="middle" font-size="11.5" fill="#333">LLM research harness</text>

  <!-- ===== Shared platform band ===== -->
  <rect x="50" y="762" width="1400" height="112" rx="12" fill="#F6F7F8" stroke="#333" stroke-width="1.8"/>
  <text x="80" y="794" font-size="16" font-weight="bold" fill="#111">The shared WFMS platform</text>
  <text x="1420" y="794" text-anchor="end" font-size="12.5" font-style="italic" fill="#777">epicprod runs on this same platform</text>
  <g font-size="13">
    <rect x="80" y="810" width="225" height="44" rx="8" fill="#cfe2f3" stroke="#3d85c6" stroke-width="1.6"/>
    <text x="192" y="837" text-anchor="middle" fill="#1c4587" font-weight="bold">PanDA · Harvester</text>
    <rect x="506" y="810" width="160" height="44" rx="8" fill="#fce5cd" stroke="#e69138" stroke-width="1.6"/>
    <text x="586" y="837" text-anchor="middle" fill="#783f04" font-weight="bold">Rucio · XRootD</text>
    <rect x="867" y="810" width="190" height="44" rx="8" fill="#d9ead3" stroke="#6aa84f" stroke-width="1.6"/>
    <text x="962" y="837" text-anchor="middle" fill="#38761d" font-weight="bold">Workflow agents</text>
    <rect x="1258" y="810" width="160" height="44" rx="8" fill="#d9d2e9" stroke="#8e7cc3" stroke-width="1.6"/>
    <text x="1338" y="837" text-anchor="middle" fill="#674ea7" font-weight="bold">AI agents</text>
  </g>
</svg>