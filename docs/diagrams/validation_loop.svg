<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="vlGray" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="vlDash" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f7f7f"/>
    </marker>
    <marker id="vlOrange" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c55a11"/>
    </marker>
    <marker id="vlGreen" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#538135"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="34" text-anchor="middle" font-size="25" font-weight="bold" fill="#1a1a1a">The Validation Loop</text>
  <text x="700" y="60" text-anchor="middle" font-size="15.5" font-style="italic" fill="#555555">Availability, validation, assessment, record, signoff — between the WFMS and ePIC validation</text>
  <text x="700" y="82" text-anchor="middle" font-size="13.5" font-style="italic" fill="#7f7f7f">Interfaces at proposal stage are dashed</text>

  <!-- Zones -->
  <rect x="40" y="96" width="1330" height="148" rx="10" fill="#f6f9ff" stroke="#b3c4e0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="56" y="116" font-size="14" font-weight="bold" fill="#17365d">epicprod / WFMS</text>

  <rect x="40" y="450" width="1330" height="156" rx="10" fill="#fffaf3" stroke="#d9c091" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="56" y="470" font-size="14" font-weight="bold" fill="#7a5c00">ePIC validation</text>

  <!-- A: task completes -->
  <rect x="60" y="126" width="300" height="90" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2.5"/>
  <text x="210" y="152" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#17365d">Campaign task completes</text>
  <text x="210" y="176" text-anchor="middle" font-size="13.5" fill="#333333">PanDA determines completion</text>
  <text x="210" y="196" text-anchor="middle" font-size="13.5" fill="#333333">Expected vs actual files</text>

  <line x1="360" y1="171" x2="396" y2="171" stroke="#555555" stroke-width="2.2" marker-end="url(#vlGray)"/>

  <!-- B: availability -->
  <rect x="400" y="126" width="300" height="90" rx="8" fill="#eaeffa" stroke="#4472c4" stroke-width="2.5"/>
  <text x="550" y="152" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#17365d">Availability signal</text>
  <text x="550" y="186" text-anchor="middle" font-size="13.5" fill="#333333">Hydra is notified from epicprod by REST</text>

  <!-- B to C: proposed interface -->
  <line x1="550" y1="216" x2="550" y2="482" stroke="#7f7f7f" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#vlDash)"/>
  <text x="538" y="345" text-anchor="end" font-size="13.5" fill="#555555">Availability + data references (proposed)</text>

  <!-- C: Hydra -->
  <rect x="400" y="486" width="300" height="90" rx="8" fill="#fdf3e0" stroke="#bf8f00" stroke-width="2.5"/>
  <text x="550" y="512" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#1a1a1a">Hydra</text>
  <text x="550" y="536" text-anchor="middle" font-size="13.5" fill="#333333">The ePIC validation application</text>
  <text x="550" y="556" text-anchor="middle" font-size="13.5" fill="#333333">Validation plots from the produced data</text>

  <!-- C to D: proposed handoff -->
  <line x1="640" y1="486" x2="756" y2="222" stroke="#7f7f7f" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#vlDash)"/>
  <text x="712" y="372" font-size="13.5" fill="#555555">Assessment handoff</text>
  <text x="712" y="390" font-size="13.5" fill="#555555">(proposed)</text>

  <!-- D: argus-ai -->
  <rect x="740" y="126" width="300" height="90" rx="8" fill="#dcdcf0" stroke="#3f3f8f" stroke-width="2.5"/>
  <text x="890" y="150" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#26265e">AI assessment</text>
  <text x="890" y="173" text-anchor="middle" font-size="13" fill="#333333">Probe: inputs + guidance + prompt</text>
  <text x="890" y="192" text-anchor="middle" font-size="13" fill="#333333">Deterministic extraction, LLM judgment</text>
  <text x="890" y="210" text-anchor="middle" font-size="12.5" font-style="italic" fill="#555555">Implemented by argus-ai via corun-ai</text>

  <line x1="1040" y1="171" x2="1076" y2="171" stroke="#555555" stroke-width="2.2" marker-end="url(#vlGray)"/>

  <!-- E: record -->
  <rect x="1080" y="126" width="300" height="90" rx="8" fill="#f1f8e9" stroke="#538135" stroke-width="2.5"/>
  <text x="1230" y="152" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#1a3311">Validation record</text>
  <text x="1230" y="176" text-anchor="middle" font-size="13.5" fill="#333333">Assessments recorded on the</text>
  <text x="1230" y="196" text-anchor="middle" font-size="13.5" fill="#333333">task, dataset, and campaign records</text>

  <!-- E to F -->
  <line x1="1230" y1="216" x2="1230" y2="482" stroke="#555555" stroke-width="2.2" marker-end="url(#vlGray)"/>
  <text x="1242" y="345" font-size="13.5" fill="#555555">Record informs review</text>

  <!-- F: expert signoff -->
  <rect x="1080" y="486" width="300" height="90" rx="8" fill="#fce5cd" stroke="#c55a11" stroke-width="2.5"/>
  <text x="1230" y="512" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#1a1a1a">Expert review &amp; signoff</text>
  <text x="1230" y="536" text-anchor="middle" font-size="13.5" fill="#333333">Assessments inform; experts decide</text>
  <text x="1230" y="556" text-anchor="middle" font-size="13.5" fill="#333333">Signoff gates release and readiness</text>

  <!-- Conversational validation query (bot) -->
  <rect x="760" y="486" width="300" height="90" rx="8" fill="#fce5cd" stroke="#c55a11" stroke-width="2.5"/>
  <text x="910" y="514" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Conversational validation query</text>
  <text x="910" y="538" text-anchor="middle" font-size="13" fill="#333333">Ask in natural language via the bot</text>
  <text x="910" y="558" text-anchor="middle" font-size="13" fill="#333333">in Mattermost — reply returns to the chat</text>

  <line x1="880" y1="482" x2="880" y2="220" stroke="#c55a11" stroke-width="2" marker-end="url(#vlOrange)"/>
  <text x="868" y="320" text-anchor="end" font-size="13" fill="#c55a11">Validation query</text>
  <line x1="920" y1="220" x2="920" y2="482" stroke="#c55a11" stroke-width="2" marker-end="url(#vlOrange)"/>
  <text x="932" y="320" font-size="13" fill="#c55a11">Assessment reply</text>

  <!-- F back to A: readiness steering -->
  <path d="M 1230 576 L 1230 648 L 210 648 L 210 222" stroke="#538135" stroke-width="2.5" fill="none" marker-end="url(#vlGreen)"/>
  <text x="720" y="668" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#538135">Readiness decisions from validation steer the campaign — release, priorities, reprocessing</text>
</svg>
