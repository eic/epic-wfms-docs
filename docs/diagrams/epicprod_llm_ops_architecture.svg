<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Arial, Helvetica, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ad1457"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#33691e"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="880" fill="#ffffff"/>

  <!-- ============ Title ============ -->
  <text x="600" y="32" text-anchor="middle" font-size="18" font-weight="bold">LLM and Distributed Computing Services Integration in epicprod — Detailed Architecture</text>
  <text x="600" y="54" text-anchor="middle" font-size="12" font-style="italic" fill="#555">Production context in swf-monitor &#160;·&#160; LLM execution &amp; artifacts in corun-ai &#160;·&#160; production credentials in the ops agent &#160;·&#160; results pushed over one SSE relay</text>

  <!-- ============ Browser row ============ -->
  <rect x="245" y="74" width="310" height="56" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="400" y="98" text-anchor="middle" font-weight="bold">Internal browser - Experts</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#555">BNL-internal · CILogon session</text>

  <rect x="645" y="74" width="310" height="56" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="800" y="98" text-anchor="middle" font-weight="bold">External browser - Collaboration</text>
  <text x="800" y="118" text-anchor="middle" font-size="11" fill="#555">Open read-only + prod requests interface for global ePIC</text>

  <!-- swf-remote proxy under external browser -->
  <rect x="645" y="152" width="310" height="48" rx="6" fill="#fce4ec" stroke="#ad1457" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="800" y="173" text-anchor="middle" font-weight="bold">swf-remote proxy · epic-devcloud.org/prod</text>
  <text x="800" y="190" text-anchor="middle" font-size="11" fill="#555">Served by swf-monitor REST API</text>

  <!-- browser -> monitor arrows -->
  <line x1="400" y1="130" x2="400" y2="210" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="130" x2="800" y2="150" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="200" x2="800" y2="210" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ swf-monitor hub ============ -->
  <rect x="110" y="212" width="980" height="158" rx="14" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="600" y="236" text-anchor="middle" font-weight="bold" font-size="15" fill="#0d47a1">swf-monitor — epicprod website</text>

  <rect x="128" y="250" width="222" height="102" rx="6" fill="#ffffff" stroke="#ad1457" stroke-width="1.4"/>
  <text x="239" y="276" text-anchor="middle" font-weight="bold" fill="#ad1457">SSE relay</text>
  <text x="239" y="298" text-anchor="middle" font-size="11" fill="#555">Dynamically relays LLM async</text>
  <text x="239" y="316" text-anchor="middle" font-size="11" fill="#555">action completion to the</text>
  <text x="239" y="338" text-anchor="middle" font-size="11" fill="#555">browser with no added latency</text>

  <rect x="364" y="250" width="222" height="102" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.1"/>
  <text x="475" y="276" text-anchor="middle" font-weight="bold">corun-ai interface</text>
  <text x="475" y="298" text-anchor="middle" font-size="11" fill="#555">Runs the LLM work and</text>
  <text x="475" y="316" text-anchor="middle" font-size="11" fill="#555">holds the results (artifacts)</text>
  <text x="475" y="338" text-anchor="middle" font-size="11" fill="#555">swf-monitor calls it over REST</text>

  <rect x="600" y="250" width="222" height="102" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.1"/>
  <text x="711" y="276" text-anchor="middle" font-weight="bold">Context for the LLMs</text>
  <text x="711" y="298" text-anchor="middle" font-size="11" fill="#555">Live facts on tasks, jobs,</text>
  <text x="711" y="316" text-anchor="middle" font-size="11" fill="#555">queues for the LLMs to read</text>
  <text x="711" y="338" text-anchor="middle" font-size="11" fill="#555">(served via MCP tools)</text>

  <rect x="836" y="250" width="236" height="102" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="1.1"/>
  <text x="954" y="276" text-anchor="middle" font-weight="bold">Production pages</text>
  <text x="954" y="298" text-anchor="middle" font-size="11" fill="#555">PanDA · PCS · queue</text>
  <text x="954" y="316" text-anchor="middle" font-size="11" fill="#555">job · campaign views</text>
  <text x="954" y="338" text-anchor="middle" font-size="11" fill="#555">+ production state</text>

  <!-- ============ Credential boundary ============ -->
  <line x1="60" y1="400" x2="1140" y2="400" stroke="#b71c1c" stroke-width="2" stroke-dasharray="10 6"/>
  <text x="600" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">Credential boundary — no credential lives above this line</text>

  <!-- request / return arrows through the boundary -->
  <line x1="310" y1="370" x2="310" y2="428" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="304" y="392" text-anchor="end" font-size="10" fill="#333">REST request &#8594;</text>
  <line x1="372" y1="428" x2="372" y2="372" stroke="#ad1457" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrow-pink)"/>
  <text x="378" y="392" text-anchor="start" font-size="10" fill="#ad1457">&#8617; callback</text>

  <line x1="840" y1="370" x2="840" y2="428" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="834" y="392" text-anchor="end" font-size="10" fill="#333">&#8594; ops queue</text>
  <line x1="902" y1="428" x2="902" y2="372" stroke="#ad1457" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrow-pink)"/>
  <text x="908" y="392" text-anchor="start" font-size="10" fill="#ad1457">&#8617; topic event</text>

  <!-- ============ SSE push straight up to internal browser ============ -->
  <line x1="300" y1="250" x2="300" y2="132" stroke="#ad1457" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow-pink)"/>
  <text x="290" y="171" text-anchor="end" font-size="10" font-style="italic" fill="#ad1457">SSE push</text>
  <text x="290" y="185" text-anchor="end" font-size="10" font-style="italic" fill="#ad1457">EventSource</text>

  <!-- ============ corun-ai + wrangle-ai wing (left) ============ -->
  <rect x="80" y="430" width="520" height="164" rx="12" fill="#e8eaf6" stroke="#3949ab" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="340" y="454" text-anchor="middle" font-weight="bold" font-size="15" fill="#283593">corun-ai + wrangle-ai — quick &amp; extended LLM executions</text>
  <text x="340" y="472" text-anchor="middle" font-size="11" font-style="italic" fill="#555">Owns LLM execution credentials &amp; LLM artifact state</text>

  <rect x="100" y="484" width="480" height="46" rx="6" fill="#ffffff" stroke="#3949ab" stroke-width="1.1"/>
  <text x="340" y="504" text-anchor="middle" font-weight="bold">wrangle-ai — rapid async LLM executor</text>
  <text x="340" y="521" text-anchor="middle" font-size="11" fill="#555">Bounded LLM ops: comment reply · assessment probe</text>

  <rect x="100" y="536" width="480" height="46" rx="6" fill="#ffffff" stroke="#3949ab" stroke-width="1.1"/>
  <text x="340" y="556" text-anchor="middle" font-weight="bold">corun-ai LLM work queue — complement to wrangle-ai</text>
  <text x="340" y="573" text-anchor="middle" font-size="11" fill="#555">heavier &amp; scheduled LLM work · prompts · config · provenance</text>

  <line x1="340" y1="594" x2="340" y2="610" stroke="#33691e" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="352" y="606" font-size="10" fill="#555">Persists</text>

  <!-- ============ epicprod_ops_agent wing (right) ============ -->
  <rect x="640" y="430" width="460" height="164" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="870" y="454" text-anchor="middle" font-weight="bold" font-size="15" fill="#4a148c">epicprod_ops_agent — PanDA, Rucio actions</text>
  <text x="870" y="472" text-anchor="middle" font-size="11" font-style="italic" fill="#555">credentialed executor · runs as prod-ops user on pandaserver02</text>

  <rect x="660" y="484" width="420" height="46" rx="6" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.1"/>
  <text x="870" y="504" text-anchor="middle" font-weight="bold">Runs the actions right away, in parallel</text>
  <text x="870" y="521" text-anchor="middle" font-size="11" fill="#555">quick, async production operations on PanDA &amp; Rucio (authenticated)</text>

  <rect x="660" y="536" width="420" height="46" rx="6" fill="#ffffff" stroke="#6a1b9a" stroke-width="1.1"/>
  <text x="870" y="556" text-anchor="middle" font-weight="bold">Production credentials</text>
  <text x="870" y="573" text-anchor="middle" font-size="11" fill="#555">PanDA OIDC · Rucio x509 · xrootd</text>

  <line x1="870" y1="594" x2="870" y2="610" stroke="#33691e" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="882" y="606" font-size="10" fill="#555">Acts on</text>

  <!-- ============ corun-ai artifact store (left, bottom) ============ -->
  <rect x="80" y="612" width="520" height="196" rx="12" fill="#f1f8e9" stroke="#33691e" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="636" text-anchor="middle" font-weight="bold" font-size="14" fill="#1b5e20">corun-ai artifact store</text>
  <text x="340" y="654" text-anchor="middle" font-size="11" font-style="italic" fill="#555">production objects hold pointers (corun_page_group_ids), not copied content</text>

  <rect x="100" y="664" width="482" height="32" rx="5" fill="#ffffff" stroke="#33691e" stroke-width="1"/>
  <text x="116" y="685" font-size="12"><tspan font-weight="bold">AI assessments</tspan> — of tasks, jobs, queues, and campaigns</text>

  <rect x="100" y="700" width="482" height="32" rx="5" fill="#ffffff" stroke="#33691e" stroke-width="1"/>
  <text x="116" y="721" font-size="12"><tspan font-weight="bold">LLM comment replies</tspan> — immutable · model/prompt provenance</text>

  <rect x="100" y="736" width="482" height="32" rx="5" fill="#ffffff" stroke="#33691e" stroke-width="1"/>
  <text x="116" y="757" font-size="12"><tspan font-weight="bold">Campaign narrative</tspan> — human-authored description for LLM context/reasoning</text>

  <rect x="100" y="772" width="482" height="30" rx="5" fill="#ffffff" stroke="#33691e" stroke-width="1"/>
  <text x="116" y="792" font-size="12"><tspan font-weight="bold">Daily campaign reports</tspan> — broad LLM status/progress analysis</text>

  <!-- ============ Production services (right) ============ -->
  <rect x="640" y="612" width="460" height="98" rx="12" fill="#f1f8e9" stroke="#33691e" stroke-width="2" filter="url(#shadow)"/>
  <text x="870" y="638" text-anchor="middle" font-weight="bold" font-size="14" fill="#1b5e20">Production services</text>
  <text x="870" y="662" text-anchor="middle" font-size="13">PanDA / JEDI &#160;·&#160; Rucio &#160;·&#160; xrootd</text>
  <text x="870" y="686" text-anchor="middle" font-size="11" font-style="italic" fill="#555">Privileged submission · replica resolution · byte transfer</text>

  <!-- ============ Async completion note (right, bottom) ============ -->
  <rect x="640" y="724" width="460" height="80" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="1.2"/>
  <text x="654" y="750" font-size="12" font-style="italic" fill="#5d4037">Async completion, one path: the ops agent emits an event to</text>
  <text x="654" y="770" font-size="12" font-style="italic" fill="#5d4037">/topic/epictopic; corun-ai posts a callback to swf-monitor.</text>
  <text x="654" y="790" font-size="12" font-style="italic" fill="#5d4037">Both become SSE events; the browser's EventSource reloads.</text>

  <!-- ============ Legend ============ -->
  <text x="600" y="836" text-anchor="middle" font-size="11" fill="#666">legend:&#160; orange = browser (human) &#160;·&#160; blue = swf-monitor (no credentials) &#160;·&#160; indigo = corun-ai + wrangle-ai (LLM) &#160;·&#160; purple = ops agent (prod credentials) &#160;·&#160; green = stores / services &#160;·&#160; pink = swf-remote &amp; SSE</text>
  <text x="600" y="856" text-anchor="middle" font-size="11" font-style="italic" fill="#666">solid arrow = request &#160;·&#160; dashed pink arrow = completion / SSE push &#160;·&#160; dashed red rule = credential boundary</text>
</svg>
