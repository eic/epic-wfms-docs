<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <pattern id="tfcells" width="34.5" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="60" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1500" height="860" fill="#ffffff"/>

  <text x="20" y="36" font-size="22" font-weight="bold" fill="#0f2f52">Time frames and super time frames — one stream, two grains</text>

  <!-- ===== tier 1: the stream ===== -->
  <text x="60" y="88" font-size="15" font-weight="bold" fill="#0f2f52">From the DAQ — one contiguous, time-ordered TF stream</text>
  <text x="1440" y="88" font-size="15" fill="#1f2937" text-anchor="end">time &#8594;</text>

  <rect x="60" y="100" width="1380" height="60" fill="#dbeafe" stroke="#1e5a96" stroke-width="1.5"/>
  <rect x="60" y="100" width="1380" height="60" fill="url(#tfcells)"/>

  <!-- physics events sparse in the stream -->
  <g fill="#16a34a">
    <circle cx="95" cy="130" r="5"/>
    <circle cx="264" cy="130" r="5"/>
    <circle cx="410" cy="130" r="5"/>
    <circle cx="573" cy="130" r="5"/>
    <circle cx="700" cy="130" r="5"/>
    <circle cx="962" cy="130" r="5"/>
    <circle cx="1100" cy="130" r="5"/>
    <circle cx="1331" cy="130" r="5"/>
  </g>

  <!-- file markers -->
  <g stroke="#db2777" stroke-width="4">
    <line x1="60" y1="96" x2="60" y2="164"/>
    <line x1="336" y1="96" x2="336" y2="164"/>
    <line x1="612" y1="96" x2="612" y2="164"/>
    <line x1="888" y1="96" x2="888" y2="164"/>
    <line x1="1164" y1="96" x2="1164" y2="164"/>
    <line x1="1440" y1="96" x2="1440" y2="164"/>
  </g>

  <!-- TF callout -->
  <line x1="230" y1="164" x2="230" y2="180" stroke="#1f2937" stroke-width="1.5"/>
  <text x="230" y="198" font-size="15" fill="#1f2937" text-anchor="middle">time frame (TF) &#8776; 0.6 ms</text>
  <text x="230" y="217" font-size="14" fill="#475569" text-anchor="middle">whole-detector, self-contained</text>

  <!-- STF bracket -->
  <path d="M 612 168 L 612 178 L 888 178 L 888 168" fill="none" stroke="#db2777" stroke-width="2"/>
  <text x="750" y="198" font-size="15" fill="#1f2937" text-anchor="middle">super time frame (STF) &#8776; 1000 TFs &#8776; 0.6 s &#8776; 2 GB</text>
  <text x="750" y="217" font-size="14" fill="#475569" text-anchor="middle">a file marker every ~1000 TFs</text>

  <!-- possible second stream -->
  <line x1="60" y1="246" x2="620" y2="246" stroke="#64748b" stroke-width="1.5" stroke-dasharray="7,5"/>
  <g fill="#ffffff" stroke="#64748b" stroke-width="1.2">
    <rect x="130" y="238" width="20" height="16"/>
    <rect x="260" y="238" width="20" height="16"/>
    <rect x="390" y="238" width="20" height="16"/>
    <rect x="520" y="238" width="20" height="16"/>
  </g>
  <text x="640" y="251" font-size="14" fill="#475569">possible second DAQ stream: selected TFs for fast monitoring — a true stream, no file markers</text>

  <!-- ===== tier 2: the two grains ===== -->

  <!-- left panel: within an STF -->
  <rect x="60" y="290" width="660" height="330" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="390" y="322" font-size="17" font-weight="bold" fill="#0f2f52" text-anchor="middle">Within an STF — time order matters</text>

  <rect x="90" y="350" width="580" height="90" fill="#dbeafe" stroke="#1e5a96" stroke-width="1.5"/>
  <g stroke="#64748b" stroke-width="1" stroke-dasharray="3,3">
    <line x1="187" y1="350" x2="187" y2="440"/>
    <line x1="284" y1="350" x2="284" y2="440"/>
    <line x1="381" y1="350" x2="381" y2="440"/>
    <line x1="478" y1="350" x2="478" y2="440"/>
    <line x1="575" y1="350" x2="575" y2="440"/>
  </g>

  <!-- physics signature spanning a TF boundary -->
  <circle cx="352" cy="395" r="7" fill="#16a34a"/>
  <rect x="352" y="389" width="118" height="12" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="411" y1="440" x2="411" y2="460" stroke="#16a34a" stroke-width="1.5"/>
  <text x="411" y="478" font-size="14" fill="#1f2937" text-anchor="middle">detector readout durations extend the physics signature across</text>
  <text x="411" y="497" font-size="14" fill="#1f2937" text-anchor="middle">TF boundaries — MAPS integration (2&#8211;8 &#181;s) above all</text>

  <!-- event finder window -->
  <rect x="280" y="340" width="300" height="110" rx="8" fill="none" stroke="#d97706" stroke-width="2.5" stroke-dasharray="8,5"/>
  <line x1="580" y1="368" x2="640" y2="368" stroke="#d97706" stroke-width="2" marker-end="url(#arr)"/>
  <text x="390" y="537" font-size="15" fill="#b45309" text-anchor="middle" font-weight="bold">the event finder slides a window of consecutive TFs</text>

  <text x="390" y="585" font-size="15" fill="#1f2937" text-anchor="middle">TFs processed together are contiguous and time-ordered, as delivered</text>

  <!-- right panel: among STFs -->
  <rect x="780" y="290" width="660" height="330" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1110" y="322" font-size="17" font-weight="bold" fill="#0f2f52" text-anchor="middle">Among STFs — any order, anywhere</text>

  <g>
    <rect x="830" y="350" width="120" height="62" rx="6" fill="#bfdbfe" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="890" y="386" font-size="15" font-family="Menlo, Consolas, monospace" fill="#0f2f52" text-anchor="middle">stf.041</text>
    <rect x="980" y="350" width="120" height="62" rx="6" fill="#bfdbfe" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="1040" y="386" font-size="15" font-family="Menlo, Consolas, monospace" fill="#0f2f52" text-anchor="middle">stf.042</text>
    <rect x="1130" y="350" width="120" height="62" rx="6" fill="#bfdbfe" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="1190" y="386" font-size="15" font-family="Menlo, Consolas, monospace" fill="#0f2f52" text-anchor="middle">stf.043</text>
    <rect x="1280" y="350" width="120" height="62" rx="6" fill="#bfdbfe" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="1340" y="386" font-size="15" font-family="Menlo, Consolas, monospace" fill="#0f2f52" text-anchor="middle">stf.044</text>
  </g>

  <g stroke="#1f2937" stroke-width="2">
    <line x1="890" y1="412" x2="1178" y2="490" marker-end="url(#arr)"/>
    <line x1="1040" y1="412" x2="936" y2="490" marker-end="url(#arr)"/>
    <line x1="1190" y1="412" x2="1330" y2="490" marker-end="url(#arr)"/>
    <line x1="1340" y1="412" x2="960" y2="490" marker-end="url(#arr)"/>
  </g>

  <g>
    <rect x="860" y="494" width="160" height="52" rx="8" fill="#93c5fd" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="940" y="525" font-size="15" font-weight="bold" fill="#0f2f52" text-anchor="middle">E1 — BNL</text>
    <rect x="1100" y="494" width="160" height="52" rx="8" fill="#93c5fd" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="1180" y="525" font-size="15" font-weight="bold" fill="#0f2f52" text-anchor="middle">E1 — JLab</text>
    <rect x="1290" y="494" width="120" height="52" rx="8" fill="#93c5fd" stroke="#1e5a96" stroke-width="1.5"/>
    <text x="1350" y="525" font-size="15" font-weight="bold" fill="#0f2f52" text-anchor="middle">E2</text>
  </g>

  <text x="1110" y="585" font-size="15" fill="#1f2937" text-anchor="middle">independent ~2 GB files, sized for shipping and processing — distributed in any order</text>

  <!-- ===== tier 3: the fast path ===== -->
  <text x="60" y="668" font-size="15" font-weight="bold" fill="#0f2f52">The fast path — sampling the STFs</text>

  <rect x="60" y="686" width="300" height="70" rx="10" fill="#dbeafe" stroke="#1e5a96" stroke-width="2"/>
  <text x="210" y="715" font-size="15" font-weight="bold" fill="#0f2f52" text-anchor="middle">DAQ exit buffer</text>
  <text x="210" y="738" font-size="14" fill="#33475e" text-anchor="middle">STF files arrive</text>

  <line x1="360" y1="721" x2="450" y2="721" stroke="#1f2937" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="405" y="708" font-size="14" fill="#1f2937" text-anchor="middle">sample</text>

  <rect x="450" y="686" width="470" height="70" rx="10" fill="#dbeafe" stroke="#1e5a96" stroke-width="2"/>
  <text x="685" y="715" font-size="15" font-weight="bold" fill="#0f2f52" text-anchor="middle">TF slices</text>
  <text x="685" y="738" font-size="14" fill="#33475e" text-anchor="middle">contiguous TF subsets, sized to seconds of processing</text>

  <line x1="920" y1="721" x2="1090" y2="721" stroke="#1f2937" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="1005" y="708" font-size="14" fill="#1f2937" text-anchor="middle">remote read (XRootD)</text>

  <rect x="1090" y="686" width="350" height="70" rx="10" fill="#dbeafe" stroke="#1e5a96" stroke-width="2"/>
  <text x="1265" y="715" font-size="15" font-weight="bold" fill="#0f2f52" text-anchor="middle">Fast processing workers</text>
  <text x="1265" y="738" font-size="14" fill="#33475e" text-anchor="middle">standing pool, O(10 s) results</text>

  <text x="750" y="820" font-size="14" fill="#555555" text-anchor="middle">TF &#8776; 0.6 ms and STF &#8776; 1000 TFs: streaming DAQ overview (J. Landgraf, July 2026). Event finding over consecutive TFs: streaming reconstruction (T. Kumaoka, July 2026).</text>
</svg>
