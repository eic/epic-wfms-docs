site_name: ePIC Workflow Management System
site_description: Documentation for the ePIC distributed workflow management system.
repo_url: https://github.com/eic/epic-wfms-docs
repo_name: eic/epic-wfms-docs

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - to-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: pdf/epic-wfms-docs.pdf
      custom_template_path: pdf_templates

nav:
  - Home: index.md
  - The System:
    - Foundations: foundations.md
    - Concepts: concepts.md
    - Architecture: architecture.md
    - WFMS Platform: platform.md
  - Workflow Domains:
    - Streaming Workflows: streaming.md
    - Production System: production.md
    - Validation: validation.md
    - Calibration: calibration.md
    - Distributed CI: ci.md
    - Distributed Analysis: analysis.md
  - Operating the System:
    - Operations: operations.md
    - Organization: organization.md
    - Timeline: timeline.md
  - References: reference.md
  - Diagram Gallery: gallery.md
  - View PDF: https://epic-wfms-docs.readthedocs.io/_/downloads/en/latest/pdf/
